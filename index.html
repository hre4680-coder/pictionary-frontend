<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎨 Lomba Gambar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', monospace;
    }
    body {
      background: linear-gradient(145deg, #0f172a, #020617);
      min-height: 100vh;
      padding: 16px;
      color: white;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
    }
    /* LOBBY */
    .lobby-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 40px 28px;
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      border: 1px solid #fbbf24;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }
    .lobby-card h1 {
      font-size: 2.4rem;
      color: #fbbf24;
    }
    .glass-input {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      border: 1px solid #fbbf24;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      margin: 10px 0;
    }
    .btn-gold {
      background: #fbbf24;
      color: #0f172a;
      font-weight: bold;
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
      font-size: 1rem;
    }
    /* GAME PANEL */
    .game-panel {
      background: #0f172a90;
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
    }
    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #02061780;
      padding: 12px 20px;
      border-radius: 60px;
      margin-bottom: 20px;
    }
    .room-badge {
      background: #fbbf2420;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
    }
    .phase {
      font-weight: bold;
      background: #1e1f3a;
      padding: 6px 16px;
      border-radius: 40px;
    }
    .timer {
      font-size: 2rem;
      font-weight: bold;
      font-family: monospace;
      background: #00000066;
      padding: 0 16px;
      border-radius: 40px;
    }
    .main-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .canvas-box {
      flex: 2;
      background: #0a0d1c;
      border-radius: 28px;
      padding: 16px;
    }
    canvas {
      background: white;
      border-radius: 24px;
      width: 100%;
      height: auto;
      cursor: crosshair;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      justify-content: center;
    }
    .tool-btn {
      background: #1e293b;
      border: none;
      padding: 8px 14px;
      border-radius: 40px;
      color: #fbbf24;
      cursor: pointer;
    }
    .chat-box {
      flex: 1;
      background: #0a0d1ccc;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 12px;
    }
    .chat-messages div {
      background: #1e293b;
      margin: 6px 0;
      padding: 8px 12px;
      border-radius: 20px;
    }
    .chat-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      background: #020617;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: none;
      background: #1e293b;
      color: white;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 700px) {
      .game-header { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOBBY -->
  <div id="lobbySection">
    <div class="lobby-card">
      <h1>🎨 LOMBA GAMBAR</h1>
      <p style="margin: 10px 0;">Buat room atau gabung dengan kode</p>
      <input type="text" id="username" class="glass-input" placeholder="Nama kamu">
      <button onclick="createRoom()" class="btn-gold">🚀 Buat Room Baru</button>
      <div style="margin: 20px 0; border-top: 1px solid #fbbf2433;"></div>
      <input type="text" id="roomCode" class="glass-input" placeholder="Kode Room (6 digit)" maxlength="6">
      <button onclick="joinRoom()" class="btn-gold">🔗 Gabung Room</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="gameSection" class="hidden">
    <div class="game-panel">
      <div class="game-header">
        <div class="room-badge" id="roomCodeDisplay">🔑 Room: -</div>
        <div class="phase" id="phaseDisplay">⏳ LOBBY</div>
        <div class="timer" id="timerDisplay">00</div>
        <div>
          <button id="startGameBtn" onclick="startGame()" class="tool-btn" style="display:none;">▶ Mulai Lomba</button>
          <button onclick="openSettings()" class="tool-btn">⚙ Pengaturan</button>
        </div>
      </div>
      <div class="main-flex">
        <div class="canvas-box">
          <canvas id="drawCanvas" width="800" height="500"></canvas>
          <div class="toolbar">
            <button onclick="clearCanvas()" class="tool-btn">🗑 Bersih</button>
            <input type="color" id="colorPicker" value="#000000" onchange="changeColor(this.value)">
            <input type="range" id="brushSlider" min="2" max="50" value="8" oninput="updateBrushSize(this.value)">
            <span id="brushSizeValue">8</span>
            <button onclick="setEraser()" class="tool-btn">🧽 Hapus</button>
          </div>
        </div>
        <div class="chat-box">
          <div style="padding: 12px; font-weight: bold;">💬 Chat</div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" class="tool-btn">Kirim</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>

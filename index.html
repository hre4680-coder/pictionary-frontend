<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎨 Lomba Gambar | Rating & Juara</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0B0E1A, #020617);
      min-height: 100vh;
      padding: 12px;
      color: #F0F3FA;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    /* Lobby */
    .lobby-card {
      background: rgba(18, 25, 55, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px 24px;
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }
    .lobby-card h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #FFE6A3, #FFA559);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .glass-input {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      border: 1px solid #fbbf24;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      margin: 12px 0;
    }
    .btn-gold {
      background: #fbbf24;
      color: #0f172a;
      font-weight: bold;
      border: none;
      padding: 12px 20px;
      border-radius: 60px;
      width: 100%;
      margin-top: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    /* Game Panel */
    .game-panel {
      background: rgba(12, 16, 32, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px;
    }
    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #02061780;
      padding: 10px 16px;
      border-radius: 60px;
      margin-bottom: 16px;
      gap: 8px;
    }
    .room-badge, .phase, .timer {
      background: #1e293b;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .timer {
      font-family: monospace;
      font-size: 1.8rem;
      background: #00000099;
      color: #FF8A5C;
    }
    /* Layout utama */
    .main-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .canvas-area {
      flex: 2;
      min-width: 260px;
      background: #0A0D1C;
      border-radius: 28px;
      padding: 12px;
    }
    .canvas-wrapper {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      text-align: center;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
      background: white;
    }
    /* Ukuran canvas di HP landscape */
    @media (orientation: landscape) {
      canvas {
        max-height: 70vh;
        width: auto;
        margin: 0 auto;
      }
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .tool-btn {
      background: #1e293b;
      border: none;
      padding: 8px 12px;
      border-radius: 40px;
      color: #fbbf24;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .chat-area {
      flex: 1.2;
      min-width: 240px;
      background: #0a0d1ccc;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-messages div {
      background: #1e293b;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      word-break: break-word;
    }
    .chat-input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: #020617;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: none;
      background: #1e293b;
      color: white;
    }
    /* Rating Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #0f172a;
      border-radius: 48px;
      padding: 24px;
      width: 320px;
      text-align: center;
      border: 2px solid #fbbf24;
    }
    .star-rating {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 2.5rem;
      cursor: pointer;
      margin: 16px 0;
    }
    .star-rating i {
      color: #ccc;
      transition: 0.1s;
    }
    .star-rating i.selected {
      color: #fbbf24;
    }
    .rating-comment {
      width: 100%;
      padding: 10px;
      border-radius: 40px;
      background: #1e293b;
      border: none;
      color: white;
      margin: 12px 0;
    }
    .btn-rating {
      background: #fbbf24;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: bold;
      width: 100%;
    }
    /* Floating notification rating */
    .floating-rating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      border-left: 5px solid #fbbf24;
      padding: 12px 18px;
      border-radius: 24px;
      max-width: 260px;
      z-index: 1050;
      animation: fadeOut 5s forwards;
      box-shadow: 0 4px 12px black;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; transform: translateY(10px); }
    }
    .hidden { display: none; }
    /* Player list */
    .player-list {
      background: #02061780;
      border-radius: 28px;
      padding: 10px;
      margin-bottom: 16px;
    }
    .player-badge {
      display: inline-block;
      background: #fbbf2420;
      padding: 4px 12px;
      border-radius: 40px;
      margin: 4px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOBBY -->
  <div id="lobbySection">
    <div class="lobby-card">
      <h1>🎨 LOMBA GAMBAR</h1>
      <p style="margin: 10px 0;">Buat Room atau Gabung</p>
      <input type="text" id="username" class="glass-input" placeholder="Nama kamu">
      <button onclick="createRoom()" class="btn-gold">🚀 Buat Room Baru</button>
      <div style="margin: 20px 0; border-top: 1px solid #fbbf2433;"></div>
      <input type="text" id="roomCode" class="glass-input" placeholder="Kode Room" maxlength="6">
      <button onclick="joinRoom()" class="btn-gold">🔗 Gabung Room</button>
    </div>
  </div>

  <!-- GAME SECTION -->
  <div id="gameSection" class="hidden">
    <div class="game-panel">
      <div class="game-header">
        <div class="room-badge" id="roomCodeDisplay">🔑 Room: -</div>
        <div class="phase" id="phaseDisplay">⏳ LOBBY</div>
        <div class="timer" id="timerDisplay">00</div>
        <div>
          <button id="startGameBtn" onclick="startGame()" class="tool-btn" style="display:none;">▶ Mulai</button>
          <button id="settingsBtn" onclick="openSettings()" class="tool-btn">⚙ Setting</button>
        </div>
      </div>
      <!-- Daftar pemain -->
      <div class="player-list">
        <strong>👥 Pemain (<span id="playerCount">0</span>)</strong>
        <div id="playerListContainer"></div>
      </div>
      <div class="main-grid">
        <div class="canvas-area">
          <div class="canvas-wrapper">
            <canvas id="drawCanvas" width="800" height="500"></canvas>
          </div>
          <div class="toolbar">
            <button onclick="clearCanvas()" class="tool-btn">🗑 Bersih</button>
            <input type="color" id="colorPicker" value="#000000" onchange="changeColor(this.value)">
            <input type="range" id="brushSlider" min="2" max="50" value="8" oninput="updateBrushSize(this.value)">
            <span id="brushSizeValue">8</span>
            <button onclick="setEraser()" class="tool-btn">🧽 Hapus</button>
          </div>
        </div>
        <div class="chat-area">
          <div style="padding: 10px; font-weight: bold;">💬 Chat</div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Pesan..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" class="tool-btn">Kirim</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Rating -->
<div id="ratingModal" class="modal">
  <div class="modal-content">
    <h3>⭐ Beri Rating untuk Gambar ⭐</h3>
    <div class="star-rating" id="starRating">
      <i class="far fa-star" data-value="1"></i>
      <i class="far fa-star" data-value="2"></i>
      <i class="far fa-star" data-value="3"></i>
      <i class="far fa-star" data-value="4"></i>
      <i class="far fa-star" data-value="5"></i>
    </div>
    <textarea id="ratingComment" class="rating-comment" rows="2" placeholder="Komentar (opsional)"></textarea>
    <button onclick="submitRating()" class="btn-rating">Kirim Rating</button>
  </div>
</div>

<!-- Modal Juara -->
<div id="winnerModal" class="modal">
  <div class="modal-content">
    <h3>🏆 JUARA RONDE INI 🏆</h3>
    <div id="winnerInfo"></div>
    <canvas id="winnerCanvas" width="300" height="200" style="width:100%; background:#fff; border-radius:16px; margin-top:12px;"></canvas>
    <button onclick="closeWinnerModal()" class="btn-gold" style="margin-top:16px;">Lanjut ke Ronde Berikutnya</button>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎨 Lomba Gambar | Arena Kreatif</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0B0E1A, #020617);
      min-height: 100vh;
      padding: 16px;
      transition: background 0.3s ease;
    }

    /* Tema dinamis (akan ditimpa oleh JS) */
    body.theme-sunset {
      background: radial-gradient(circle at 70% 20%, #2c1a2e, #0f0717);
    }
    body.theme-ocean {
      background: radial-gradient(circle at 10% 70%, #0a2f44, #001f2f);
    }
    body.theme-forest {
      background: radial-gradient(circle at 30% 80%, #1a3b2b, #0a1f12);
    }
    body.theme-retro {
      background: radial-gradient(circle at 50% 50%, #3e2a2f, #1e1018);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* LOBBY CARD */
    .lobby-card {
      background: rgba(18, 25, 55, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 36px 28px;
      max-width: 520px;
      margin: 60px auto;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
    }

    .lobby-card h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #FFE6A3, #FFA559);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #FFD966;
      margin-bottom: 6px;
      display: block;
    }

    .glass-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(10, 14, 30, 0.9);
      border: 1.5px solid rgba(255, 215, 0, 0.4);
      border-radius: 60px;
      font-size: 1rem;
      color: white;
      font-family: inherit;
      outline: none;
    }

    .glass-input:focus {
      border-color: #FFB347;
      box-shadow: 0 0 10px rgba(255,180,70,0.4);
    }

    .btn-primary {
      background: linear-gradient(95deg, #FFB347, #FF7E05);
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0B0C1A;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      transition: 0.2s;
    }

    .btn-primary:active { transform: scale(0.97); }

    /* GAME PANEL */
    .game-panel {
      background: rgba(12, 16, 32, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(255, 200, 100, 0.3);
    }

    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.4);
      padding: 12px 20px;
      border-radius: 60px;
      margin-bottom: 20px;
    }

    .room-code-badge {
      background: #FFB34720;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      border-left: 3px solid #FFD966;
    }

    .phase-text {
      font-weight: 800;
      background: #1F2340;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    .timer-number {
      font-family: monospace;
      font-size: 2rem;
      font-weight: 800;
      color: #FF8A5C;
      background: #00000066;
      padding: 0 16px;
      border-radius: 50px;
      line-height: 1.2;
    }

    .header-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .icon-btn {
      background: #232842;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      color: #FFE5B4;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-btn i { margin-right: 8px; }

    /* Grid Utama */
    .main-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .canvas-card {
      flex: 2;
      min-width: 260px;
      background: #0A0D1C;
      border-radius: 32px;
      padding: 16px;
    }

    .canvas-wrapper {
      background: white;
      border-radius: 24px;
      overflow: auto;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      cursor: crosshair;
      background: white;
      width: 100%;
      height: auto;
    }

    /* Toolbar */
    .toolbar {
      background: rgba(26, 30, 55, 0.9);
      border-radius: 60px;
      padding: 10px 16px;
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .tool-btn {
      background: #1E223E;
      border: none;
      padding: 8px 14px;
      border-radius: 50px;
      color: #FFE5B4;
      font-weight: 500;
      cursor: pointer;
    }

    .color-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1A1D3A;
      padding: 5px 12px;
      border-radius: 60px;
    }

    input[type="color"] {
      width: 40px;
      height: 40px;
      border: 2px solid #FFD966;
      border-radius: 60px;
      background: transparent;
    }

    /* Chat Panel */
    .chat-card {
      flex: 1.2;
      min-width: 250px;
      background: #0E1022cc;
      backdrop-filter: blur(8px);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      height: 280px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-messages div {
      background: #1A1E3A;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      word-break: break-word;
    }

    .chat-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      background: #080B1A;
    }

    .chat-input-area input {
      flex: 1;
      background: #1E213F;
      border: none;
      padding: 12px;
      border-radius: 40px;
      color: white;
      font-family: inherit;
    }

    .chat-input-area button {
      background: #FFB347;
      border: none;
      border-radius: 40px;
      padding: 0 20px;
      font-weight: bold;
    }

    /* Modal Setting */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #13172F;
      border-radius: 48px;
      padding: 24px;
      width: 280px;
      text-align: center;
      border: 1px solid gold;
    }
    .theme-option {
      background: #232842;
      margin: 12px 0;
      padding: 12px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
    }
    .theme-option:hover { background: #FFB347; color: #0B0C1A; }

    @media (max-width: 700px) {
      body { padding: 8px; }
      .game-header { flex-direction: column; align-items: stretch; }
      .timer-number { text-align: center; }
      .toolbar { gap: 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOBBY -->
  <div id="lobbySection" class="lobby-card">
    <h1>🎨 LOMBA GAMBAR</h1>
    <div style="margin-bottom: 24px;">✨ Kreasi Tanpa Batas ✨</div>
    <div class="input-group">
      <label>✏️ Nama Peserta</label>
      <input type="text" id="username" class="glass-input" placeholder="Nama kreatifmu...">
    </div>
    <button onclick="createRoom()" class="btn-primary"><i class="fas fa-plus-circle"></i> Buat Room Baru</button>
    <div style="margin: 20px 0; border-top: 1px dashed rgba(255,215,0,0.3);"></div>
    <div class="input-group">
      <label>🔑 Kode Room (6 digit)</label>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="roomCode" class="glass-input" maxlength="6" placeholder="A1B2C3" style="text-transform:uppercase">
        <button onclick="joinRoom()" class="btn-primary" style="width: auto; padding: 0 24px;">Gabung</button>
      </div>
    </div>
  </div>

  <!-- GAME AREA (hidden awal) -->
  <div id="gameSection" style="display: none;">
    <div class="game-panel">
      <div class="game-header">
        <div class="room-code-badge" id="roomCodeDisplay">🔑 Room: ----</div>
        <div class="phase-text" id="phaseDisplay">⏳ LOBBY</div>
        <div class="timer-number" id="timerDisplay">00</div>
        <div class="header-buttons">
          <button id="startGameBtn" onclick="startGame()" class="icon-btn" style="display: none;"><i class="fas fa-play"></i> Mulai Lomba</button>
          <button id="settingsBtn" onclick="openSettings()" class="icon-btn"><i class="fas fa-sliders-h"></i> Pengaturan</button>
        </div>
      </div>

      <div class="main-grid">
        <!-- CANVAS + TOOLBAR -->
        <div class="canvas-card">
          <div class="canvas-wrapper">
            <canvas id="drawCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; background:white;"></canvas>
          </div>
          <div class="toolbar">
            <button onclick="clearCanvas()" class="tool-btn"><i class="fas fa-trash-alt"></i> Bersih</button>
            <div class="color-preview">
              <i class="fas fa-palette"></i>
              <input type="color" id="colorPicker" value="#000000" onchange="changeColor(this.value)">
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
              <i class="fas fa-pencil-alt"></i>
              <input type="range" id="brushSlider" min="2" max="50" value="8" oninput="updateBrushSize(this.value)">
              <span id="brushSizeValue">8</span>
            </div>
            <button onclick="setEraser()" class="tool-btn"><i class="fas fa-eraser"></i> Hapus</button>
          </div>
        </div>

        <!-- CHAT -->
        <div class="chat-card">
          <div style="padding: 12px; background:#0A0D1C; font-weight: bold;"><i class="fas fa-comments"></i> Ruang Ngobrol</div>
          <div id="chatMessages" class="chat-messages">
            <div style="text-align:center; opacity:0.6;">💬 Pesan akan muncul...</div>
          </div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Pengaturan Tema -->
<div id="themeModal" class="modal">
  <div class="modal-content">
    <h3>🎨 Pilih Tema Ruangan</h3>
    <div class="theme-option" onclick="setTheme('sunset')">🌇 Senja & Emas</div>
    <div class="theme-option" onclick="setTheme('ocean')">🌊 Samudra Biru</div>
    <div class="theme-option" onclick="setTheme('forest')">🌿 Hutan Hijau</div>
    <div class="theme-option" onclick="setTheme('retro')">📺 Retro 80an</div>
    <button onclick="closeModal()" class="btn-primary" style="margin-top:16px;">Tutup</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

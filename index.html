<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎨 Lomba Gambar - Arena Kreatif</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0B0E1A, #020617);
      min-height: 100vh;
      padding: 12px;
      transition: background 0.3s ease;
      color: #F0F3FA;
    }
    /* Tema opsional */
    body.theme-sunset { background: radial-gradient(circle at 70% 20%, #2c1a2e, #0f0717); }
    body.theme-ocean { background: radial-gradient(circle at 10% 70%, #0a2f44, #001f2f); }
    body.theme-forest { background: radial-gradient(circle at 30% 80%, #1a3b2b, #0a1f12); }
    body.theme-retro { background: radial-gradient(circle at 50% 50%, #3e2a2f, #1e1018); }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    /* LOBBY CARD */
    .lobby-card {
      background: rgba(18, 25, 55, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px 24px;
      max-width: 500px;
      margin: 40px auto;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
    }
    .lobby-card h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #FFE6A3, #FFA559);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .glass-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(10, 14, 30, 0.9);
      border: 1.5px solid rgba(255, 215, 0, 0.4);
      border-radius: 60px;
      font-size: 1rem;
      color: white;
      font-family: inherit;
      outline: none;
      margin: 8px 0;
    }
    .glass-input:focus {
      border-color: #FFB347;
      box-shadow: 0 0 10px rgba(255,180,70,0.4);
    }
    .btn-gold {
      background: linear-gradient(95deg, #FFB347, #FF7E05);
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0B0C1A;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn-gold:active { transform: scale(0.97); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #FFB347;
      color: #FFD966;
    }
    /* GAME PANEL */
    .game-panel {
      background: rgba(12, 16, 32, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px;
      border: 1px solid rgba(255, 200, 100, 0.3);
    }
    /* Header game */
    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.4);
      padding: 10px 16px;
      border-radius: 60px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .room-badge {
      background: #FFB34720;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .phase {
      font-weight: 800;
      background: #1F2340;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .timer {
      font-family: monospace;
      font-size: 1.8rem;
      font-weight: 800;
      color: #FF8A5C;
      line-height: 1;
    }
    .header-buttons {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: #232842;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      color: #FFE5B4;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
    }
    /* Player list */
    .player-list-area {
      background: rgba(0,0,0,0.3);
      border-radius: 28px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .player-list-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .player-badge {
      background: #FFB34720;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    /* Canvas & Chat Grid - responsif landscape */
    .main-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    @media (min-width: 768px) and (orientation: landscape) {
      .main-grid {
        flex-direction: row;
        align-items: stretch;
      }
      .canvas-card {
        flex: 3;
      }
      .chat-card {
        flex: 1.2;
      }
    }
    .canvas-card {
      background: #0A0D1C;
      border-radius: 28px;
      padding: 12px;
    }
    .canvas-wrapper {
      background: white;
      border-radius: 24px;
      overflow: auto;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: white;
      width: 100%;
      height: auto;
      cursor: crosshair;
      touch-action: none; /* penting untuk touch drawing */
    }
    /* Ukuran canvas tetap 800x500, tapi tampilan di HP menggunakan lebar penuh */
    canvas {
      max-width: 100%;
      height: auto;
    }
    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      background: rgba(26, 30, 55, 0.9);
      border-radius: 60px;
      padding: 8px 12px;
    }
    .tool-btn {
      background: #1E223E;
      border: none;
      padding: 8px 14px;
      border-radius: 50px;
      color: #FFE5B4;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .color-preview {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1A1D3A;
      padding: 4px 12px;
      border-radius: 60px;
    }
    input[type="color"] {
      width: 36px;
      height: 36px;
      border: 2px solid #FFD966;
      border-radius: 60px;
      background: transparent;
    }
    /* Chat */
    .chat-card {
      background: #0E1022cc;
      backdrop-filter: blur(8px);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 300px;
    }
    .chat-messages {
      flex: 1;
      height: 260px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-messages div {
      background: #1A1E3A;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      word-break: break-word;
    }
    .chat-input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: #080B1A;
    }
    .chat-input-area input {
      flex: 1;
      background: #1E213F;
      border: none;
      padding: 10px 14px;
      border-radius: 40px;
      color: white;
      font-family: inherit;
    }
    /* Modal Settings */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #13172F;
      border-radius: 48px;
      padding: 24px;
      width: 280px;
      text-align: center;
      border: 1px solid #fbbf24;
    }
    .hidden {
      display: none;
    }
    /* Landscape orientation: buat canvas lebih besar */
    @media (orientation: landscape) and (max-width: 900px) {
      body {
        padding: 8px;
      }
      .game-panel {
        padding: 12px;
      }
      .canvas-card {
        padding: 8px;
      }
      .toolbar {
        gap: 6px;
      }
      .tool-btn {
        padding: 6px 10px;
        font-size: 0.7rem;
      }
    }
    /* Untuk HP portrait, chat di bawah canvas */
    @media (max-width: 767px) {
      .main-grid {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOBBY SECTION -->
  <div id="lobbySection">
    <div class="lobby-card">
      <h1><i class="fas fa-paintbrush"></i> LOMBA GAMBAR</h1>
      <p style="margin-bottom: 20px;">Buat room atau gabung dengan kode</p>
      <div class="input-group">
        <input type="text" id="username" class="glass-input" placeholder="Nama kamu">
      </div>
      <button onclick="createRoom()" class="btn-gold"><i class="fas fa-plus-circle"></i> Buat Room Baru</button>
      <div style="margin: 20px 0; border-top: 1px solid rgba(255,215,0,0.3);"></div>
      <div class="input-group">
        <input type="text" id="roomCode" class="glass-input" placeholder="Kode Room (6 digit)" maxlength="6" style="text-transform:uppercase">
      </div>
      <button onclick="joinRoom()" class="btn-gold btn-outline"><i class="fas fa-sign-in-alt"></i> Gabung Room</button>
    </div>
  </div>

  <!-- GAME SECTION (awal tersembunyi) -->
  <div id="gameSection" class="hidden">
    <div class="game-panel">
      <div class="game-header">
        <div class="room-badge" id="roomCodeDisplay">🔑 Room: -</div>
        <div class="phase" id="phaseDisplay">⏳ LOBBY</div>
        <div class="timer" id="timerDisplay">00</div>
        <div class="header-buttons">
          <button id="startGameBtn" onclick="startGame()" class="icon-btn" style="display:none;"><i class="fas fa-play"></i> Mulai</button>
          <button id="settingsRoomBtn" onclick="openSettingsModal()" class="icon-btn" style="display:none;"><i class="fas fa-sliders-h"></i> Setting</button>
          <button onclick="openThemeModal()" class="icon-btn"><i class="fas fa-palette"></i> Tema</button>
        </div>
      </div>

      <!-- Daftar pemain -->
      <div class="player-list-area">
        <strong><i class="fas fa-users"></i> Pemain (<span id="playerCount">0</span>)</strong>
        <div id="playerListContainer" class="player-list-container"></div>
      </div>

      <div class="main-grid">
        <!-- CANVAS CARD -->
        <div class="canvas-card">
          <div class="canvas-wrapper">
            <canvas id="drawCanvas" width="800" height="500"></canvas>
          </div>
          <div class="toolbar">
            <button onclick="clearCanvas()" class="tool-btn"><i class="fas fa-trash-alt"></i> Bersih</button>
            <div class="color-preview">
              <i class="fas fa-palette"></i>
              <input type="color" id="colorPicker" value="#000000" onchange="changeColor(this.value)">
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
              <i class="fas fa-pencil-alt"></i>
              <input type="range" id="brushSlider" min="2" max="50" value="8" oninput="updateBrushSize(this.value)">
              <span id="brushSizeValue">8</span>
            </div>
            <button onclick="setEraser()" class="tool-btn"><i class="fas fa-eraser"></i> Hapus</button>
          </div>
        </div>

        <!-- CHAT CARD -->
        <div class="chat-card">
          <div style="padding: 12px; background:#0A0D1C; font-weight: bold; border-radius: 28px 28px 0 0;">
            <i class="fas fa-comments"></i> Ruang Chat
          </div>
          <div id="chatMessages" class="chat-messages">
            <div style="text-align:center; opacity:0.6;">💬 Pesan akan muncul...</div>
          </div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" class="tool-btn"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Setting Room (hanya host) -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3 style="color:#fbbf24;"><i class="fas fa-cog"></i> Pengaturan Room</h3>
    <label style="display:block; margin-top:16px;">⏱ Durasi Menggambar</label>
    <select id="settingDuration" style="width:100%; padding:10px; border-radius:40px; background:#1e293b; color:white;">
      <option value="30">30 detik</option>
      <option value="60" selected>60 detik</option>
      <option value="90">90 detik</option>
      <option value="120">120 detik</option>
    </select>
    <label style="display:block; margin-top:12px;">🎯 Jumlah Ronde</label>
    <select id="settingRounds" style="width:100%; padding:10px; border-radius:40px; background:#1e293b; color:white;">
      <option value="1">1 ronde</option>
      <option value="2">2 ronde</option>
      <option value="3" selected>3 ronde</option>
      <option value="4">4 ronde</option>
      <option value="5">5 ronde</option>
    </select>
    <label style="display:block; margin-top:12px;">📚 Kategori Kata</label>
    <select id="settingCategory" style="width:100%; padding:10px; border-radius:40px; background:#1e293b; color:white;">
      <option value="acak">Acak</option>
      <option value="binatang">Hewan</option>
      <option value="benda">Benda</option>
      <option value="profesi">Profesi</option>
    </select>
    <button onclick="saveSettingsAndClose()" class="btn-gold" style="margin-top:20px;">Simpan</button>
  </div>
</div>

<!-- Modal Tema -->
<div id="themeModal" class="modal">
  <div class="modal-content">
    <h3>🎨 Pilih Tema Ruangan</h3>
    <div class="theme-option" style="background:#232842; margin:10px 0; padding:10px; border-radius:60px; cursor:pointer;" onclick="setTheme('sunset')">🌇 Senja & Emas</div>
    <div class="theme-option" style="background:#232842; margin:10px 0; padding:10px; border-radius:60px; cursor:pointer;" onclick="setTheme('ocean')">🌊 Samudra Biru</div>
    <div class="theme-option" style="background:#232842; margin:10px 0; padding:10px; border-radius:60px; cursor:pointer;" onclick="setTheme('forest')">🌿 Hutan Hijau</div>
    <div class="theme-option" style="background:#232842; margin:10px 0; padding:10px; border-radius:60px; cursor:pointer;" onclick="setTheme('retro')">📺 Retro 80an</div>
    <button onclick="closeModal()" class="btn-gold" style="margin-top:16px;">Tutup</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>

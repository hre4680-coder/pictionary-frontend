<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎨 Lomba Gambar | Kompetisi Seru</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0B0E1A, #020617);
      min-height: 100vh;
      padding: 12px;
      color: #F0F3FA;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .hidden { display: none !important; }

    /* LOBBY CARD */
    .lobby-card {
      background: rgba(18,25,55,0.7);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px;
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      border: 1px solid #fbbf24;
    }
    .glass-input {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      border: 1px solid #fbbf24;
      border-radius: 60px;
      color: white;
      margin: 12px 0;
      font-size: 1rem;
    }
    .btn-gold {
      background: #fbbf24;
      color: #0f172a;
      font-weight: bold;
      border: none;
      padding: 12px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    .btn-gold:active { transform: scale(0.97); }

    /* GAME PANEL */
    .game-panel {
      background: rgba(12,16,32,0.7);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px;
    }
    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #02061780;
      padding: 10px 16px;
      border-radius: 60px;
      margin-bottom: 16px;
      gap: 8px;
    }
    .phase, .timer, .room-badge {
      background: #1e293b;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
    }
    .timer { font-size: 1.8rem; font-family: monospace; background: #00000099; color: #FF8A5C; }
    .player-list {
      background: #02061780;
      border-radius: 28px;
      padding: 10px;
      margin-bottom: 16px;
    }
    .player-badge {
      display: inline-block;
      background: #fbbf2420;
      padding: 4px 12px;
      border-radius: 40px;
      margin: 4px;
      font-size: 0.85rem;
    }
    .canvas-area {
      background: #0A0D1C;
      border-radius: 28px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .canvas-wrapper {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: white;
      cursor: crosshair;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .tool-btn {
      background: #1e293b;
      border: none;
      padding: 8px 12px;
      border-radius: 40px;
      color: #fbbf24;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .chat-area {
      background: #0a0d1ccc;
      border-radius: 28px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
    }
    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 12px;
    }
    .chat-messages div {
      background: #1e293b;
      padding: 6px 12px;
      border-radius: 20px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .chat-input-area {
      display: flex;
      padding: 10px;
      gap: 8px;
      background: #020617;
      border-radius: 0 0 28px 28px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: none;
      background: #1e293b;
      color: white;
    }

    /* MODAL SETTING */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #0f172a;
      border-radius: 48px;
      padding: 24px;
      width: 320px;
      text-align: center;
      border: 2px solid #fbbf24;
    }
    .modal-content select, .modal-content input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 40px;
      background: #1e293b;
      color: white;
      border: none;
    }

    /* VOTING CAROUSEL */
    .voting-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .voting-card {
      background: #0f172a;
      border-radius: 48px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .voting-card img {
      width: 100%;
      border-radius: 24px;
      background: white;
      margin: 16px 0;
    }
    .rating-stars {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 2.5rem;
      margin: 16px 0;
    }
    .rating-stars i {
      cursor: pointer;
      color: #ccc;
      transition: 0.1s;
    }
    .rating-stars i.selected, .rating-stars i.hover {
      color: #fbbf24;
    }
    .vote-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* WINNER MODAL */
    .winner-modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }
    .winner-card {
      background: #0f172a;
      border-radius: 48px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 2px solid gold;
    }
    .winner-card img {
      width: 100%;
      border-radius: 24px;
      margin: 16px 0;
    }
    .podium {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .podium-item {
      text-align: center;
    }
    .medal { font-size: 2rem; }

    @media (orientation: landscape) {
      canvas { max-height: 60vh; width: auto; margin: 0 auto; }
      .voting-card img { max-height: 50vh; object-fit: contain; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOBBY -->
  <div id="lobbySection">
    <div class="lobby-card">
      <h1>🎨 LOMBA GAMBAR</h1>
      <p style="margin: 10px 0;">Buat Room atau Gabung</p>
      <input type="text" id="username" class="glass-input" placeholder="Nama kamu">
      <button onclick="window.createRoom()" class="btn-gold">🚀 Buat Room Baru</button>
      <div style="margin:20px 0; border-top:1px solid #fbbf2433;"></div>
      <input type="text" id="roomCode" class="glass-input" placeholder="Kode Room (6 digit)" maxlength="6">
      <button onclick="window.joinRoom()" class="btn-gold">🔗 Gabung Room</button>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="gameSection" class="hidden">
    <div class="game-panel">
      <div class="game-header">
        <div class="room-badge" id="roomCodeDisplay">🔑 Room: -</div>
        <div class="phase" id="phaseDisplay">⏳ LOBBY</div>
        <div class="timer" id="timerDisplay">00</div>
        <div>
          <button id="startGameBtn" onclick="window.startGame()" class="tool-btn" style="display:none;">▶ Mulai Lomba</button>
          <button id="settingsBtn" onclick="window.openSettings()" class="tool-btn">⚙ Setting</button>
        </div>
      </div>
      <div class="player-list">
        <strong>👥 Pemain (<span id="playerCount">0</span>)</strong>
        <div id="playerListContainer"></div>
      </div>
      <div class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="drawCanvas" width="800" height="500"></canvas>
        </div>
        <div class="toolbar">
          <button onclick="window.undo()" class="tool-btn">↩️ Undo</button>
          <button onclick="window.redo()" class="tool-btn">↪️ Redo</button>
          <button onclick="window.clearCanvas()" class="tool-btn">🗑 Bersih</button>
          <input type="color" id="colorPicker" value="#000000" onchange="window.changeColor(this.value)">
          <input type="range" id="brushSlider" min="2" max="50" value="8" oninput="window.updateBrushSize(this.value)">
          <span id="brushSizeValue">8</span>
          <button onclick="window.setEraser()" class="tool-btn">🧽 Hapus</button>
          <button onclick="window.openBgPicker()" class="tool-btn">🖼️ BG</button>
        </div>
      </div>
      <div class="chat-area">
        <div style="padding:10px; font-weight:bold;">💬 Chat</div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Pesan..." onkeypress="if(event.key==='Enter') window.sendChat()">
          <button onclick="window.sendChat()" class="tool-btn">Kirim</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
